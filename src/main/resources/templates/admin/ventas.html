<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Phantom | Reporte de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/CSS/admin.css}"/>
</head>
<body>

<nav class="navbar-ts">
    <a href="/" class="brand" style="text-decoration:none; color:inherit;">PHANTOM</a>
    <a href="/admin/productos" class="nav-btn"><i class="bi bi-arrow-left"></i> Volver</a>
</nav>

<div class="main main-lista">
    <div class="page-header">
        <div>
            <div class="page-title">Reporte de <span>Ventas</span></div>
            <div class="page-sub">// PHANTOM — Historial de transacciones</div>
        </div>
    </div>

    <form th:action="@{/admin/productos/ventas}" method="get" class="search-bar">
        <input type="text" name="keyword" class="search-input"
               placeholder="Buscar por ID o usuario..."
               th:value="${keyword}"/>
        <button type="submit" class="search-btn"><i class="bi bi-search"></i> Buscar</button>
        <a href="/admin/productos/ventas" class="nav-btn"><i class="bi bi-x"></i> Limpiar</a>
    </form>

    <div class="table-wrap">
        <table id="ventasTable">
            <thead>
            <tr>
                <th class="sortable" data-type="number">ID <i class="bi bi-arrow-down-up sort-icon text-muted"></i></th>
                <th class="sortable">Fecha <i class="bi bi-arrow-down-up sort-icon text-muted"></i></th>
                <th class="sortable">Usuario <i class="bi bi-arrow-down-up sort-icon text-muted"></i></th>
                <th>Estado</th>
                <th class="sortable" data-type="number">Total <i class="bi bi-arrow-down-up sort-icon text-muted"></i></th>
                <th>Items</th>
                <th class="sortable" data-type="string">N° Orden <i class="bi bi-arrow-down-up sort-icon text-muted"></i></th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="venta : ${ventas}">
                <tr>
                    <td style="color:var(--muted); font-family: 'Space Mono', monospace;" th:text="${venta.id}"></td>
                    <td th:text="${#temporals.format(venta.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td style="font-weight: 600;" th:text="${venta.usuario != null ? venta.usuario.nombre : '—'}"></td>
                    <td><span class="badge-cat" th:text="${venta.estado}"></span></td>
                    <td>
                        <a data-bs-toggle="collapse"
                           th:href="'#detalle-' + ${venta.id}"
                           role="button"
                           style="text-decoration: none; color: white; cursor: pointer;">
                            <span class="precio" th:text="'S/ ' + ${#numbers.formatDecimal(venta.total != null ? venta.total : 0, 1, 2)}"></span>
                            <i class="bi bi-chevron-down" style="font-size: 0.7rem; margin-left: 6px; opacity: 0.7;"></i>
                        </a>
                    </td>
                    <td th:text="${venta.cantidadItems}"></td>
                    <td style="color:var(--muted); font-family: 'Space Mono', monospace; font-weight: bold;" th:text="${venta.numeroOrden != null ? venta.numeroOrden : '—'}"></td>
                </tr>

                <tr class="collapse" th:id="'detalle-' + ${venta.id}">
                    <td colspan="7" style="padding: 10px 20px;">
                        <div class="detalle-container">
                            <h6 class="detalle-title"><i class="bi bi-box-seam"></i> Productos detallados</h6>
                            <ul class="detalle-list">
                                <li class="detalle-item" th:each="detalle : ${venta.detalles}">
                                    <span style="color: #ccc;">
                                        <span class="detalle-qty" th:text="${detalle.cantidad + 'x'}"></span>
                                        <span th:text="${detalle.producto != null ? detalle.producto.nombre : 'Producto borrado'}"></span>
                                    </span>
                                    <span class="detalle-price" th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario != null ? detalle.precioUnitario : 0, 1, 2)}">S/ 0.00</span>
                                </li>
                            </ul>
                        </div>
                    </td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const table = document.getElementById('ventasTable');
        if (!table) return;

        const tbody = table.querySelector('tbody');
        const headers = table.querySelectorAll('th.sortable');

        const sortTable = (index, isNumeric, currentOrder, th) => {
            const allRows = Array.from(tbody.querySelectorAll('tr'));
            const dataRows = allRows.filter(row => !row.classList.contains('collapse'));

            dataRows.sort((a, b) => {
                let valA = a.children[index].innerText.trim().replace(/S\/\s*/g, '').replace(/,/g, '');
                let valB = b.children[index].innerText.trim().replace(/S\/\s*/g, '').replace(/,/g, '');

                if (isNumeric) {
                    return currentOrder === 'asc' ? parseFloat(valA || 0) - parseFloat(valB || 0) : parseFloat(valB || 0) - parseFloat(valA || 0);
                } else {
                    return currentOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
            });

            dataRows.forEach(row => {
                tbody.appendChild(row);
                const detalleId = row.querySelector('[data-bs-toggle="collapse"]')?.getAttribute('href');
                if (detalleId) {
                    const detalleRow = tbody.querySelector(detalleId);
                    if (detalleRow) tbody.appendChild(detalleRow);
                }
            });
        };

        headers.forEach(th => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const index = Array.from(th.parentNode.children).indexOf(th);
                const isNumeric = th.dataset.type === 'number';
                const currentOrder = th.dataset.order === 'asc' ? 'desc' : 'asc';

                headers.forEach(h => {
                    h.dataset.order = '';
                    const icon = h.querySelector('.sort-icon');
                    if(icon) icon.className = 'bi bi-arrow-down-up sort-icon text-muted';
                });

                th.dataset.order = currentOrder;
                const activeIcon = th.querySelector('.sort-icon');
                if(activeIcon) {
                    activeIcon.className = currentOrder === 'asc' ? 'bi bi-arrow-up sort-icon text-danger' : 'bi bi-arrow-down sort-icon text-danger';
                }
                sortTable(index, isNumeric, currentOrder, th);
            });
        });

        const idHeader = headers[0];
        idHeader.dataset.order = 'desc';
        const icon = idHeader.querySelector('.sort-icon');
        if(icon) icon.className = 'bi bi-arrow-down sort-icon text-danger';
        sortTable(0, true, 'desc', idHeader);
    });
</script>
</body>
</html>
