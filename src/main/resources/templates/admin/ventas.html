<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reporte de Ventas</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
          rel="stylesheet">
</head>

<body>

<nav class="navbar-ts">
    <a href="/" class="brand" style="text-decoration:none; color:inherit;"><i class="bi bi-house-fill" style="font-size:0.85em; margin-right:6px;"></i>PHANTOM</a>

    <div class="nav-links">
        <a href="/admin/productos" class="nav-btn">
            ← Volver a Productos
        </a>
    </div>
</nav>

<main class="main main-lista">

    <div class="page-header">
        <div>
            <h1 class="page-title">
                Reporte de <span>Ventas</span>
            </h1>
            <p class="page-sub">
                Historial completo de ventas registradas
            </p>
        </div>
    </div>

    <!-- Estadística -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total ventas</div>
            <div class="stat-value red"
                 th:text="${#lists.size(ventas)}">
                0
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Items</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(ventas)}">
                <td colspan="4" class="empty">
                    No existen ventas registradas.
                </td>
            </tr>

            <tr th:each="venta : ${ventas}">
                <td th:text="${venta.id}"></td>

                <td th:text="${venta.fecha}"></td>

                <td>
                    <span class="precio"
                          th:text="'S/ ' + ${venta.total}">
                    </span>
                </td>

                <td>
                    <span class="badge-count count-has"
                          th:text="${venta.cantidadItems}">
                    </span>
                </td>
            </tr>

            </tbody>

        </table>

    </div>

</main>

</body>
</html>
